<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FIREGUARD Local H5P Player</title>
  <!-- Load H5P CSS from jsDelivr CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/h5p-standalone/dist/styles/h5p.css">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #f8fafc;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: auto;
    }
    #h5p-container {
      width: 100%;
      min-height: 100vh;
      box-sizing: border-box;
      background: white;
    }
    /* Customize the player slightly for a premium feel */
    .h5p-content {
      border: none !important;
      box-shadow: none !important;
    }
  </style>
</head>
<body>
  <div id="h5p-container"></div>

  <!-- Load H5P standalone scripts from jsDelivr CDN -->
  <script src="https://cdn.jsdelivr.net/npm/h5p-standalone/dist/main.bundle.js" charset="UTF-8"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      // Parse query string parameters (e.g. ?id=bai_1)
      const params = new URLSearchParams(window.location.search);
      let lessonId = params.get('id') || 'bai_1';
      
      // Tự động thêm tiền tố 'h5p/' nếu lessonId cấu hình chưa có (ví dụ 'bai_1' -> 'h5p/bai_1')
      if (lessonId && !lessonId.startsWith('h5p/')) {
        lessonId = 'h5p/' + lessonId;
      }
      
      // Parse state string if available (encoded JSON string)
      const stateParam = params.get('state');
      let contentUserData = [];
      if (stateParam) {
        try {
          const decodedState = decodeURIComponent(stateParam);
          // Verify it's valid JSON
          JSON.parse(decodedState);
          contentUserData = [
            {
              state: decodedState,
              subContentId: 0,
              dataType: 'state'
            }
          ];
          console.log("Restoring H5P state for lesson " + lessonId);
        } catch (e) {
          console.error("Error parsing H5P state:", e);
        }
      }
      
      const el = document.getElementById('h5p-container');
      
      const options = {
        h5pJsonPath: '/' + lessonId,
        frameJs: 'https://cdn.jsdelivr.net/npm/h5p-standalone/dist/frame.bundle.js',
        frameCss: 'https://cdn.jsdelivr.net/npm/h5p-standalone/dist/styles/h5p.css',
        contentUserData: contentUserData
      };
      
      let mainInstance = null;
      
      // Initialize the standalone H5P player
      new H5PStandalone.H5P(el, options).then(function (h5p) {
        mainInstance = h5p;
        setupXAPI();
        setupNativeVideoTracking();
      }).catch(function (error) {
        console.error("Lỗi nạp H5P:", error);
      });

      function setupXAPI() {
        if (window.H5P && window.H5P.externalDispatcher) {
          if (!window.h5pXApiListenerAdded) {
            window.h5pXApiListenerAdded = true;
            window.H5P.externalDispatcher.on('xAPI', function (event) {
              const statement = event.data.statement;
              const verbId = statement?.verb?.id || '';

              // Lấy instance thật sự của H5P trên trang
              const targetInstance = (window.H5P && window.H5P.instances && window.H5P.instances[0]) || mainInstance;
              let state = null;
              if (targetInstance && typeof targetInstance.getCurrentState === 'function') {
                try {
                  state = targetInstance.getCurrentState();
                } catch (e) {
                  console.warn("Could not get current H5P state:", e);
                }
              }

              // Calculate percentage
              let percentage = 0;
              if (verbId.endsWith('/completed') || verbId === 'completed') {
                percentage = 100;
              } else {
                if (state && state.video) {
                  if (state.video.progress !== undefined) {
                    percentage = Math.round(state.video.progress);
                  } else if (state.video.time !== undefined && targetInstance.video && typeof targetInstance.video.getDuration === 'function') {
                    const duration = targetInstance.video.getDuration();
                    if (duration > 0) {
                      percentage = Math.round((state.video.time / duration) * 100);
                    }
                  }
                }
                
                // Fallback: if user answers an interaction, ensure they get at least some progress
                if (!percentage || percentage === 0) {
                  if (verbId.endsWith('/answered') || verbId === 'answered') {
                    percentage = 50;
                  }
                }
              }

              if (window.parent) {
                window.parent.postMessage({
                  type: 'H5P_XAPI',
                  lessonId: lessonId,
                  statement: statement,
                  percentage: percentage,
                  state: state ? JSON.stringify(state) : null
                }, '*');
              }
            });
          }
        }
      }

      function setupNativeVideoTracking() {
        // Polling để tìm thẻ video HTML5 render từ H5P (kể cả bên trong iframe của H5P)
        const searchInterval = setInterval(function() {
          let videoEl = el.querySelector('video');
          
          // Nếu không tìm thấy trực tiếp ở lớp ngoài, duyệt qua các iframe cùng nguồn để tìm video
          if (!videoEl) {
            const iframes = el.querySelectorAll('iframe');
            for (let i = 0; i < iframes.length; i++) {
              try {
                const iframeDoc = iframes[i].contentDocument || iframes[i].contentWindow.document;
                if (iframeDoc) {
                  videoEl = iframeDoc.querySelector('video');
                  if (videoEl) break;
                }
              } catch (e) {
                // Bỏ qua lỗi CORS chéo domain nếu có
              }
            }
          }

          if (videoEl) {
            clearInterval(searchInterval);
            console.log("HTML5 Video element found inside H5P!");

            let lastPostedPercent = 0;
            
            // Theo dõi tiến trình xem video (timeupdate)
            videoEl.addEventListener('timeupdate', function() {
              const current = videoEl.currentTime;
              const duration = videoEl.duration;
              
              if (duration > 0) {
                const percentage = Math.round((current / duration) * 100);
                // Giảm tần suất gửi tin nhắn lên parent bằng cách chỉ gửi khi tăng tối thiểu 2%
                if (percentage > lastPostedPercent && percentage - lastPostedPercent >= 2) {
                  lastPostedPercent = percentage;
                  if (window.parent) {
                    window.parent.postMessage({
                      type: 'H5P_XAPI',
                      lessonId: lessonId,
                      percentage: percentage,
                      statement: null,
                      state: null
                    }, '*');
                  }
                }
              }
            });

            // Khi video hoàn tất
            videoEl.addEventListener('ended', function() {
              console.log("HTML5 Video completed! Mark H5P as completed.");
              if (window.parent) {
                window.parent.postMessage({
                  type: 'H5P_XAPI',
                  lessonId: lessonId,
                  percentage: 100,
                  statement: {
                    verb: { id: 'completed', display: { 'en-US': 'completed' } },
                    result: { score: { raw: 10, max: 10 }, completion: true }
                  },
                  state: null
                }, '*');
              }
            });
          }
        }, 1000);
      }
    });
  </script>
</body>
</html>
